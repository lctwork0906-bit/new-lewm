defaults:
  - _self_
  - launcher: local
  - data: voxel
  - model: lewm_3d

model_type: voxel

output_model_name: lewm_voxel
subdir: ${hydra:job.id}

num_workers: 4
train_split: 0.9
seed: 3072
embed_dim: 64
history_size: 3
voxel_size: [8, 24, 24]

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 32
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 2
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

wandb:
  enabled: False